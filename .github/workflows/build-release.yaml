name: Build Release

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release Tag (v1.x.x)'
        required: true

jobs:
  BuildRelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Convert and set version env
        id: process-version
        run: |
          VERSION_TAG=${{ inputs.release-tag }}
          VERSION_TAG=${VERSION_TAG#v}
          IFS='.' read -ra VERSION_PARTS <<< "$VERSION_TAG"
          VERSION_CODE=$(printf "%1d%02d%03d" "${VERSION_PARTS[0]}" "${VERSION_PARTS[1]}" "${VERSION_PARTS[2]}")

          echo "versionName=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Re-write version
        uses: Devofure/advance-android-version-actions@v1.5
        with:
          gradlePath: app/build.gradle.kts
          versionCode: ${{ steps.process-version.outputs.versionCode }}
          versionName: ${{ steps.process-version.outputs.versionName }}

      - name: Commit and push if changes
        run: |
          changes=$(git diff --name-only origin/main | wc -l)
          if [ $changes -gt 0 ]
          then
            newVersionName=${{ steps.process-version.outputs.versionName }}
            newVersionCode=${{ steps.process-version.outputs.versionCode }}
            git config --global user.name 'GitHub Action'
            git config --global user.email 'action@github.com'
            git add app/build.gradle.kts
            git commit -am "Bump version to $newVersionName ($newVersionCode)"
            git tag "v$newVersionName"
            git fetch origin main
            git rebase origin/main
            git push --follow-tags
          fi

      - name: Download FFmpeg binaries
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64

          # Download pre-built FFmpeg for Android
          # NOTE: Replace with actual Android cross-compiled FFmpeg binaries
          # See README.md for build instructions
          echo "FFmpeg binaries must be pre-placed or downloaded from a release"

      - name: Signing properties
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -n "$SIGNING_STORE_PASSWORD" ]; then
            touch signing.properties
            echo keystore.password="$SIGNING_STORE_PASSWORD" > signing.properties
            echo key.alias="$SIGNING_KEY_ALIAS" >> signing.properties
            echo key.password="$SIGNING_KEY_PASSWORD" >> signing.properties
            echo "Signing properties created"
          else
            echo "No signing secrets configured, skipping"
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew --no-daemon --stacktrace assembleRelease

      - name: Tag Repo
        uses: richardsimko/update-tag@v1
        with:
          tag_name: ${{ inputs.release-tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        if: ${{ success() }}
        with:
          tag_name: ${{ inputs.release-tag }}
          files: app/build/outputs/apk/release/*
          generate_release_notes: true
